name: Release

# Builds native installers for all three platforms and publishes them as a
# GitHub Release. Each build job runs on its own OS so better-sqlite3 is compiled
# for that platform (cross-building a native module from a single machine is not
# reliable). Trigger by pushing a `v*` tag or from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
          - os: windows-latest # x64
            script: build:win
          - os: windows-11-arm # native arm64 Windows runner (free on public repos)
            script: build:win-arm
          - os: ubuntu-latest
            script: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      # Full install (with scripts) so postinstall rebuilds better-sqlite3 for
      # this runner's OS/arch and Electron ABI.
      - run: npm ci --legacy-peer-deps
      - name: Build installers
        run: npm run ${{ matrix.script }}
        env:
          # Unsigned build: do not search for signing certificates (would fail or
          # hang on CI). Provide real certs/secrets here to sign. --publish never
          # (in the build scripts) keeps electron-builder from uploading; the
          # release job below attaches the files instead.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml

  release:
    name: Publish GitHub Release
    needs: build
    # Only publish a release for real tags, not manual (branch) dispatches.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Collect installers from all platforms
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release with installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NoteIt ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**
