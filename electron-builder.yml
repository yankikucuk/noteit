appId: com.noteit.app
productName: NoteIt
copyright: Copyright © 2026 NoteIt

directories:
  buildResources: build
  output: dist

# All-negation list => everything is included except these. Keeps `out/**`,
# `resources/**`, `package.json` and production `node_modules` in the package.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!test/*'
  - '!scripts/*'
  - '!.github/*'
  - '!.nvmrc'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{eslint.config.js,vitest.config.js,.prettierrc.json,.prettierignore,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'

# better-sqlite3 is a native module and must live outside the asar to load.
asarUnpack:
  - '**/node_modules/better-sqlite3/**'

# Rebuild native modules against the packaging target's Electron ABI. Combined
# with per-OS CI runners (see .github/workflows/release.yml) this yields a
# correct better-sqlite3 for each platform/arch.
npmRebuild: true

# Shared installer/artifact naming, e.g. "NoteIt-0.1.0-arm64.dmg".
artifactName: ${productName}-${version}-${arch}.${ext}

# Custom URL scheme: noteit:// deep links (noteit://note/<id>, ://new, ://explorer).
# Declared here so the OS registers the app as the handler at install time
# (macOS Info.plist CFBundleURLTypes, Windows registry).
protocols:
  - name: NoteIt
    schemes: [noteit]

# Architecture policy (deliberate): 64-bit only. This app does not support 32-bit
# processors, so every target below pins a 64-bit arch (arm64 / x64) and no
# target ever builds ia32 or armv7l.
mac:
  target:
    - target: dmg
      arch: [arm64]
    - target: zip # required by electron-updater for macOS auto-update
      arch: [arm64]
  category: public.app-category.productivity
  darkModeSupport: true
  # --- Code signing & notarization ---
  # hardenedRuntime + entitlements are required for notarization. To sign &
  # notarize, provide a "Developer ID Application" certificate (login keychain or
  # CSC_LINK/CSC_KEY_PASSWORD) and set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD and
  # APPLE_TEAM_ID, then set `notarize: true`. Without them the build stays
  # unsigned (CI sets CSC_IDENTITY_AUTO_DISCOVERY=false to skip signing cleanly).
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

dmg:
  # Standard drag-to-Applications layout.
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  # No arch list here — deliberately. An explicit `arch:` in the config
  # overrides the CLI flags, which made BOTH Windows CI runners build BOTH
  # architectures plus a dual-arch universal installer: identically named,
  # byte-different artifacts that corrupted the auto-update metadata (the
  # published latest.yml carried checksums of files that were never uploaded).
  # The arch is passed per runner instead: build:win uses --x64 on
  # windows-latest and build:win-arm uses --arm64 on windows-11-arm, so each
  # runner builds exactly one native installer.
  target: nsis
  # --- Code signing (Windows) ---
  # Provide a certificate via CSC_LINK (path/base64 of .pfx) + CSC_KEY_PASSWORD to
  # avoid SmartScreen warnings. Unsigned otherwise.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NoteIt

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  maintainer: NoteIt <noteit@example.com>
  synopsis: Sticky notes for your desktop
  description: Frameless sticky notes backed by a local SQLite database.
  executableName: noteit
  desktop:
    entry:
      StartupWMClass: NoteIt

# --- Auto-update publishing ---
# Update metadata (latest*.yml) and the packaged app's updater both target the
# public GitHub releases of this repo. The release workflow attaches the
# installers to the release, so electron-updater can check and download updates
# from there. `--publish never` (used by the build scripts) still generates the
# metadata locally without uploading.
publish:
  provider: github
  owner: yankikucuk
  repo: noteit
